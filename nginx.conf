server {
    listen 80;
    server_name localhost;

    # Directorio de los archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # Soporte para Single Page Application (SPA) con React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Habilitar compresión Gzip para mejorar el rendimiento
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache de assets estáticos (JS, CSS, imágenes)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # No cachear el index.html para evitar problemas al desplegar nuevas versiones
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Redirigir peticiones API al backend de Spring Boot (Proxy Reverso)
    # Nota: 'app' es el nombre del servicio/contenedor de Spring Boot en el docker-compose (puerto 8080)
    # Usamos una variable y un resolver para evitar que Nginx falle al iniciar si el backend no está corriendo.
    location /api {
        resolver 127.0.0.11 valid=30s;
        set $upstream_app http://app:8080;
        proxy_pass $upstream_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Páginas de error
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
